# Example Ryoshi Detection Rule for Credential Theft
# This is a template showing the complete structure of a rule

title: Example - OAuth Token Theft via Suspicious Consent
id: example-1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
status: experimental
description: |
  This is an example rule demonstrating how to detect OAuth token theft.
  When actual log samples are provided, this rule should be refined with
  real field names and values from the environment.
  
  The rule detects when users grant consent to OAuth applications that
  may be malicious, based on characteristics like permissions requested,
  publisher verification status, and application metadata.
author: Ryoshi Team
date: 2025-01-10
modified: 2025-01-10
references:
  - https://attack.mitre.org/techniques/T1528/
  - https://docs.microsoft.com/en-us/security/
tags:
  - credential_theft
  - oauth
  - persistence
severity: high
logsource:
  category: outlook
  product: office365
detection:
  selection_consent:
    action: "Consent to application"
  selection_suspicious:
    permissions|contains:
      - "Mail.ReadWrite"
      - "Mail.Send"
  condition: selection_consent and selection_suspicious
  timeframe: 5m
falsepositives:
  - Legitimate enterprise applications
  - First-party Microsoft applications
level: high
