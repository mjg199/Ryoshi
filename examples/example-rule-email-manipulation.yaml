# Example Ryoshi Detection Rule for Email Manipulation
# This is a template showing detection of email deletion

title: Example - Bulk Email Deletion
id: example-3c4d5e6f-7a8b-9c0d-1e2f-3a4b5c6d7e8f
status: experimental
description: |
  This is an example rule demonstrating how to detect bulk email deletion.
  When actual log samples are provided, this rule should be refined with
  real field names and values from the environment.
  
  The rule detects when large numbers of emails are deleted in a short
  timeframe, which may indicate an attacker covering their tracks.
author: Ryoshi Team
date: 2025-01-10
references:
  - https://attack.mitre.org/techniques/T1070/004/
tags:
  - email_manipulation
  - defense_evasion
severity: high
logsource:
  category: outlook
  product: office365
detection:
  selection:
    action:
      - "SoftDelete"
      - "HardDelete"
    item_type: "Message"
  count:
    deleted_items: ">= 50"
  condition: selection
  timeframe: 15m
falsepositives:
  - Users cleaning mailbox
  - IT maintenance
  - Retention policies
level: high
