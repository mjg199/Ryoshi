# Example Ryoshi Detection Rule for Email Forwarding
# This is a template showing detection of forwarding rule creation

title: Example - External Email Forwarding Rule
id: example-2b3c4d5e-6f7a-8b9c-0d1e-2f3a4b5c6d7e
status: experimental
description: |
  This is an example rule demonstrating how to detect external email forwarding.
  When actual log samples are provided, this rule should be refined with
  real field names and values from the environment.
  
  The rule detects creation of inbox rules that forward emails to external
  domains, which is a common data exfiltration and persistence technique.
author: Ryoshi Team
date: 2025-01-10
references:
  - https://attack.mitre.org/techniques/T1114/003/
tags:
  - forwarding_rules
  - data_exfiltration
  - persistence
severity: high
logsource:
  category: outlook
  product: office365
detection:
  selection:
    action: "New-InboxRule"
    mailbox_rule_action:
      - "ForwardTo"
      - "RedirectTo"
  filter_internal:
    forwarding_address|endswith: "@company.com"
  condition: selection and not filter_internal
falsepositives:
  - Legitimate business processes
  - IT department tasks
level: high
