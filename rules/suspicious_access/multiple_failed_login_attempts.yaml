title: Multiple Failed Email Login Attempts
id: 2f3a4b5c-6d7e-4f8a-9b0c-1d2e3f4a5b6c
status: stable
description: |
  Detects multiple failed login attempts to email accounts within a
  short timeframe. This is a common indicator of password spraying,
  credential stuffing, or brute force attacks targeting email accounts.
author: Ryoshi Security Team
date: 2025-01-10
references:
  - https://attack.mitre.org/techniques/T1110/003/
  - https://attack.mitre.org/techniques/T1110/004/
tags:
  - suspicious_access
  - credential_access
  - brute_force
severity: high
logsource:
  category: outlook
  product: office365
detection:
  selection:
    action: "MailboxLogin"
    auth_result: 
      - "Failed"
      - "Failure"
    error_code:
      - "InvalidPassword"
      - "InvalidUserNameOrPassword"
  count:
    failed_attempts: ">= 10"
  condition: selection
  timeframe: 30m
falsepositives:
  - Users forgetting passwords after vacation or leave
  - Password expiration causing multiple attempts
  - Misconfigured email clients retrying with old credentials
  - Users with multiple devices using cached wrong passwords
level: high
