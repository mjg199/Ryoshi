title: Token Compromise - Session Hijacking from Multiple IPs
id: ryoshi-m365-token-compromise-session-hijacking
status: experimental
description: |
  Detects token compromise where a single session/token is used from multiple
  geographically diverse IP addresses. Uses a hybrid detection approach:
  1. Network-prefix diversity analysis (3+ distinct /24 IPv4 or /64 IPv6 prefixes)
  2. Geographic impossible travel detection (multi-country access)
  3. IP reputation check via AbuseIPDB integration
  
  This provides higher fidelity than simple IP count thresholds, reducing
  false positives from legitimate VPN/mobile network usage.
severity: CRITICAL
logsource:
  category: authentication
  product: M365
  service: AzureActiveDirectory
detection:
  rule_type: session_correlation
  selection:
    session_id: "*"
  correlation:
    by: session_id
    requirements:
      unique_ips: ">=3"
      unique_subnets: ">=3"
  condition: selection grouped by session_id where unique_subnets >= 3
output_fields:
  - timestamp: CreationDate
  - session_id: SessionId
  - client_ip: ClientIP
  - operation: Operations
  - country: GeoLocation
  - abuse_score: AbuseIPDB
falsepositives:
  - Corporate VPN exit nodes (usually same country)
  - CDN or load balancer behavior (same subnet range)
  - Legitimate travel with proper timing (not impossible travel)
mitigation:
  - Revoke all OAuth tokens immediately
  - Force password reset
  - Enable conditional access policies
  - Review inbox rules for auto-forwarding
  - Check for data exfiltration (MailItemsAccessed)
references:
  - https://docs.microsoft.com/en-us/microsoft-365/compliance/advanced-audit
  - https://www.abuseipdb.com/
