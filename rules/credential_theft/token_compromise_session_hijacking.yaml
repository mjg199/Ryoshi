title: Token Compromise - Session Hijacking from Multiple IPs
id: ryoshi-m365-token-compromise-session-hijacking
status: experimental
description: |
  Detects token compromise where a single session/token is used from multiple
  distinct IP addresses. This indicates an attacker has stolen a user's session
  token and is actively replaying it across their infrastructure.
severity: CRITICAL
logsource:
  category: authentication
  product: M365
  service: AzureActiveDirectory
detection:
  # This rule uses session-based correlation - same session from multiple IPs
  rule_type: session_correlation
  selection:
    session_id: "*"
  correlation:
    by: session_id
    requirements:
      unique_ips: ">=2"
  condition: selection grouped by session_id where unique_ips >= 2
output_fields:
  - timestamp: CreationDate
  - session_id: SessionId
  - client_ip: ClientIP
  - operation: Operations
falsepositives:
  - Legitimate use of OAuth refresh tokens across regions
  - CDN or load balancer network behavior
mitigation:
  - Revoke all OAuth tokens
  - Force password reset
  - Enable conditional access policies
