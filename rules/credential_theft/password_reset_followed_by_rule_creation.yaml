title: Password Reset Followed by Inbox Rule Creation
id: 8b4e0f2a-5c3d-4e9b-af80-2b3c4d5e6f7a
status: stable
description: |
  Detects a pattern where a password reset is followed by the creation of an inbox rule
  within a short timeframe. This is a common indicator of account takeover where an
  attacker resets the password, gains access, and then creates rules to hide their
  activities or exfiltrate data.
author: Ryoshi Security Team
date: 2025-01-10
modified: 2025-01-15
references:
  - https://attack.mitre.org/techniques/T1098/
  - https://attack.mitre.org/techniques/T1114/003/
tags:
  - credential_theft
  - account_compromise
  - persistence
severity: critical
logsource:
  category: outlook
  product: office365
detection:
  selection_reset:
    action: 
      - "Reset user password"
      - "Change user password"
    event_type: "AzureActiveDirectory"
  selection_rule:
    action: 
      - "New-InboxRule"
      - "Set-InboxRule"
    event_type: "Exchange"
  condition: selection_reset and selection_rule
  timeframe: 1h
falsepositives:
  - Users immediately creating rules after help desk password reset
  - Automated IT processes during onboarding
  - Security-mandated password changes followed by legitimate rule setup
level: critical
