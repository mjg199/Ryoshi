title: Suspicious OAuth Application Consent Grant
id: 7a3d9e1f-4b2c-4d8a-9e7f-1a2b3c4d5e6f
status: stable
description: |
  Detects when a user grants consent to an OAuth application with suspicious characteristics,
  such as unusual permissions, external applications, or applications with generic names.
  This may indicate an OAuth phishing attack where attackers trick users into granting
  access to their email accounts.
author: Ryoshi Security Team
date: 2025-01-10
modified: 2025-01-15
references:
  - https://attack.mitre.org/techniques/T1528/
  - https://docs.microsoft.com/en-us/security/operations/incident-response-playbook-app-consent
  - https://www.microsoft.com/security/blog/2021/03/11/protecting-against-illicit-consent-grant-attacks/

tags:
  - credential_theft
  - oauth
  - persistence
  - initial_access
severity: high
logsource:
  category: outlook
  product: office365
detection:
  selection_consent:
    action: "Consent to application"
    event_type: "AzureActiveDirectory"
  selection_suspicious_perms:
    permissions:
      - "Mail.ReadWrite"
      - "Mail.ReadWrite.All"
      - "Mail.Send"
      - "MailboxSettings.ReadWrite"
      - "full_access_as_app"
  selection_external:
    publisher_verified: "false"
  condition: selection_consent and (selection_suspicious_perms or selection_external)
  timeframe: 5m
falsepositives:
  - Legitimate third-party email clients or productivity tools
  - Enterprise-approved applications during onboarding
  - Microsoft first-party applications
  - Known business automation tools
level: high
