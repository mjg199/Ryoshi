title: Credential Theft - Multiple Sessions from Different Countries
id: ryoshi-m365-credential-theft-multiple-sessions
status: experimental
description: |
  Detects credential theft where an attacker uses stolen credentials to establish
  multiple distinct sessions from different countries. Uses a hybrid detection approach:
  1. Session and IP diversity as baseline filters
  2. Geolocation enrichment to verify multi-country access
  3. Country exclusion support to reduce false positives from known locations
  
  This provides higher fidelity than simple IP/session count thresholds, reducing
  false positives from VPN usage, mobile network changes, and travel.
severity: CRITICAL
logsource:
  category: authentication
  product: M365
  service: AzureActiveDirectory
detection:
  # This rule uses built-in correlation with geolocation enrichment
  rule_type: correlation
  selection:
    operation: UserLoggedIn
  filter:
    result_status: Success
  correlation:
    by: user_id
    requirements:
      unique_sessions: ">=2"
      unique_ips: ">=2"
      unique_countries: ">=2"
    timeframe: 24h
  condition: selection and filter with correlation
output_fields:
  - timestamp: CreationDate
  - user: UserIds
  - session_id: SessionId
  - client_ip: ClientIP
  - operation: Operations
  - workload: Workload
  - device_properties: DeviceProperties
  - result_status: ResultStatus
report:
  title: "Credential Theft Detection: Multiple Sessions"
  severity: CRITICAL
  template: |
    User: {user}
    Detection Time: {timestamp}
    Sessions Detected: {unique_sessions}
    Unique IPs: {unique_ips}
    Duration: {duration_hours}h
    First Activity: {first_seen}
    Last Activity: {last_seen}
    
    Session IDs:
    {session_ids}
    
    IP Addresses:
    {ip_addresses}
    
    Recommendation:
    - Reset user password immediately
    - Revoke all active sessions
    - Enable MFA if not already enabled
    - Review mailbox rules and forwarding settings
    - Check email downloads and send activity
falsepositives:
  - Business travel with legitimate logins from multiple countries within 24 hours
  - Use of international VPN exit nodes in different countries
  - Rapid country changes during layovers (use --exclude-country for known locations)
mitigation:
  - Force password reset
  - Revoke all OAuth tokens
  - Disable legacy authentication protocols
  - Review inbox rules and forwarding
  - Monitor for subsequent suspicious activities
