title: Credential Theft - Multiple Sessions from Diverse IPs
id: ryoshi-m365-credential-theft-multiple-sessions
status: experimental
description: |
  Detects credential theft where an attacker uses stolen credentials to establish
  multiple distinct sessions from geographically diverse IP addresses within a short
  timeframe. This pattern indicates the attacker is actively using compromised 
  credentials across different locations/infrastructure.
severity: CRITICAL
logsource:
  category: authentication
  product: M365
  service: AzureActiveDirectory
detection:
  # This rule uses built-in correlation - matches are aggregated by user
  rule_type: correlation
  selection:
    operation: UserLoggedIn
  filter:
    result_status: Success
  correlation:
    by: user_id
    requirements:
      unique_sessions: ">=2"
      unique_ips: ">=2"
    timeframe: 24h
  condition: selection and filter with correlation
output_fields:
  - timestamp: CreationDate
  - user: UserIds
  - session_id: SessionId
  - client_ip: ClientIP
  - operation: Operations
  - workload: Workload
  - device_properties: DeviceProperties
  - result_status: ResultStatus
report:
  title: "Credential Theft Detection: Multiple Sessions"
  severity: CRITICAL
  template: |
    User: {user}
    Detection Time: {timestamp}
    Sessions Detected: {unique_sessions}
    Unique IPs: {unique_ips}
    Duration: {duration_hours}h
    First Activity: {first_seen}
    Last Activity: {last_seen}
    
    Session IDs:
    {session_ids}
    
    IP Addresses:
    {ip_addresses}
    
    Recommendation:
    - Reset user password immediately
    - Revoke all active sessions
    - Enable MFA if not already enabled
    - Review mailbox rules and forwarding settings
    - Check email downloads and send activity
falsepositives:
  - Business travel with legitimate logins from multiple locations
  - Legitimate use of VPN/proxy infrastructure
  - Rapid location changes with layovers during travel
mitigation:
  - Force password reset
  - Revoke all OAuth tokens
  - Disable legacy authentication protocols
  - Review inbox rules and forwarding
  - Monitor for subsequent suspicious activities
