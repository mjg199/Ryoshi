title: Suspicious Email Access from Tor or Anonymous VPN
id: 9c5f1a3b-6d4e-4f0c-ba91-3c4d5e6f7a8b
status: stable
description: |
  Detects email account access from known Tor exit nodes or anonymous VPN services.
  While VPN usage may be legitimate, access from anonymizing services combined with
  unusual activity patterns often indicates unauthorized access attempts or compromised
  credentials being used by threat actors.
author: Ryoshi Security Team
date: 2025-01-10
references:
  - https://attack.mitre.org/techniques/T1090/003/
  - https://www.microsoft.com/security/blog/threat-intelligence/
tags:
  - credential_theft
  - suspicious_access
  - anonymization
severity: medium
logsource:
  category: outlook
  product: office365
detection:
  selection:
    action: "MailboxLogin"
    client_ip_reputation:
      - "Tor"
      - "Anonymous VPN"
      - "Anonymous Proxy"
  filter_known:
    user_risk_level: "None"
    is_compliant_device: "true"
  condition: selection and not filter_known
falsepositives:
  - Remote workers using corporate VPN that appears as anonymous
  - Privacy-conscious users with legitimate reasons
  - Journalists or security researchers
  - Users in countries with restricted internet access
level: medium
