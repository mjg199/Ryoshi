title: Email with Sensitive Keywords Sent Externally
id: 8b9c0d1e-2f3a-4b4c-5d6e-7f8a9b0c1d2e
status: experimental
description: |
  Detects emails containing sensitive keywords in the subject or body
  being sent to external recipients. This may indicate unauthorized
  sharing of confidential information, intellectual property theft,
  or data breach attempts.
author: Ryoshi Security Team
date: 2025-01-10
references:
  - https://attack.mitre.org/techniques/T1048/003/
  - https://attack.mitre.org/techniques/T1567/
tags:
  - data_exfiltration
  - data_leak
  - insider_threat
severity: high
logsource:
  category: outlook
  product: office365
detection:
  selection_send:
    action: "Send"
  selection_keywords:
    subject|contains:
      - "confidential"
      - "classified"
      - "secret"
      - "internal only"
      - "proprietary"
      - "financial results"
      - "merger"
      - "acquisition"
      - "salary"
      - "SSN"
      - "credit card"
  selection_external:
    recipient_domain_type: "External"
  filter_known:
    recipient_domain|endswith:
      - "@partner.com"
      - "@vendor.com"
      - "@trusted-partner.com"
  condition: selection_send and selection_keywords and selection_external and not filter_known
falsepositives:
  - Legitimate business communications with approved partners
  - Marketing or PR materials using generic keywords
  - Legal communications with external counsel
  - HR communications with recruitment agencies
  - False matches on common words
level: high
