title: Bulk Email Download via API or Client
id: 9c0d1e2f-3a4b-4c5d-6e7f-8a9b0c1d2e3f
status: stable
description: |
  Detects bulk downloading of emails via API calls or email clients.
  Large-scale email downloads may indicate an attacker exfiltrating
  mailbox contents after gaining access, or an insider threat collecting
  sensitive information before departure.
author: Ryoshi Security Team
date: 2025-01-10
references:
  - https://attack.mitre.org/techniques/T1114/002/
  - https://attack.mitre.org/techniques/T1005/
tags:
  - data_exfiltration
  - collection
  - account_compromise
severity: high
logsource:
  category: outlook
  product: office365
detection:
  selection_access:
    action:
      - "MailItemsAccessed"
      - "Sync"
      - "MessageBind"
  selection_bulk:
    accessed_items_count: ">= 100"
  selection_api:
    client_app_id|contains:
      - "REST"
      - "EWS"
      - "Graph"
      - "IMAP"
      - "POP3"
  condition: (selection_access and selection_bulk) or (selection_api and selection_bulk)
  timeframe: 1h
falsepositives:
  - Initial email client synchronization
  - Email migration tools
  - Backup and archival solutions
  - eDiscovery and compliance tools
  - Users switching to new devices
  - Mobile device full synchronization
level: high
