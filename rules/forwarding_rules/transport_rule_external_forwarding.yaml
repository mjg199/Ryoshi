title: Transport Rule Created for External Email Forwarding
id: 3c4d5e6f-7a8b-4c9d-0e1f-2a3b4c5d6e7f
status: stable
description: |
  Detects the creation of transport rules that forward emails to external addresses.
  Unlike inbox rules which affect individual mailboxes, transport rules operate at
  the organizational level and can forward all matching emails, making them extremely
  dangerous in the hands of an attacker with sufficient privileges.
author: Ryoshi Security Team
date: 2025-01-10
references:
  - https://attack.mitre.org/techniques/T1114/003/
  - https://docs.microsoft.com/en-us/exchange/security-and-compliance/mail-flow-rules/mail-flow-rules
tags:
  - forwarding_rules
  - data_exfiltration
  - persistence
  - privilege_escalation
severity: critical
logsource:
  category: outlook
  product: office365
detection:
  selection:
    action: "New-TransportRule"
    rule_action:
      - "BlindCopyTo"
      - "CopyTo"
      - "Redirect"
  filter_internal:
    recipient_address|endswith:
      - "@company.com"
      - "@organization.local"
  condition: selection and not filter_internal
falsepositives:
  - Legitimate business email forwarding policies
  - Compliance and legal hold requirements
  - Email archival solutions
  - Partner integration forwarding
level: critical
