title: Hidden Email Forwarding Rule with Auto-Deletion
id: 2b3c4d5e-6f7a-4b8c-9d0e-1f2a3b4c5d6e
status: stable
description: |
  Detects inbox rules that both forward emails and delete them from the inbox.
  This sophisticated technique is used by attackers to exfiltrate data while
  hiding evidence of their access. The deletion prevents the user from seeing
  forwarded emails, making the compromise harder to detect.
author: Ryoshi Security Team
date: 2025-01-10
modified: 2025-01-15
references:
  - https://attack.mitre.org/techniques/T1114/003/
  - https://attack.mitre.org/techniques/T1070/004/
tags:
  - forwarding_rules
  - data_exfiltration
  - defense_evasion
  - persistence
severity: critical
logsource:
  category: outlook
  product: office365
detection:
  selection_forward:
    action: "New-InboxRule"
    mailbox_rule_action:
      - "ForwardTo"
      - "ForwardAsAttachmentTo"
      - "RedirectTo"
  selection_delete:
    rule_actions|contains:
      - "Delete"
      - "MoveToFolder"
      - "MarkAsRead"
  selection_hidden:
    rule_name|contains:
      - "."
      - " "
      - "_"
  condition: selection_forward and (selection_delete or selection_hidden)
falsepositives:
  - Corporate email archival policies
  - Automated compliance forwarding and retention
  - IT-managed email routing rules
  - Very rare legitimate user workflows
level: critical
