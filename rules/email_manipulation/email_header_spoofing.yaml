title: Email Header Spoofing Attempt Detected
id: 4d5e6f7a-8b9c-4d0e-1f2a-3b4c5d6e7f8a
status: stable
description: |
  Detects attempts to spoof email headers to impersonate trusted senders.
  Attackers manipulate From, Reply-To, or Return-Path headers to make
  emails appear to come from legitimate sources, often used in phishing
  and business email compromise (BEC) attacks.
author: Ryoshi Security Team
date: 2025-01-10
references:
  - https://attack.mitre.org/techniques/T1566/001/
  - https://attack.mitre.org/techniques/T1598/
tags:
  - email_manipulation
  - phishing
  - impersonation
severity: high
logsource:
  category: outlook
  product: office365
detection:
  selection_mismatch:
    sender_display_name|contains:
      - "CEO"
      - "CFO"
      - "President"
      - "Executive"
      - "Finance"
  selection_spf_fail:
    spf_result: "Fail"
  selection_dmarc_fail:
    dmarc_result:
      - "Fail"
      - "None"
  selection_external:
    sender_domain_match_internal: "false"
  condition: selection_mismatch and (selection_spf_fail or selection_dmarc_fail) and selection_external
falsepositives:
  - Legitimate external partners with similar names
  - Mailing lists or newsletters using generic sender names
  - Misconfigured email servers
  - Third-party services sending on behalf of the organization
level: high
