title: Sent Items Deleted Immediately After Sending
id: 6f7a8b9c-0d1e-4f2a-3b4c-5d6e7f8a9b0c
status: stable
description: |
  Detects when sent emails are immediately deleted from the Sent Items folder.
  Attackers often delete sent items to hide evidence of phishing emails,
  spam campaigns, or data exfiltration sent from a compromised account.
  This helps them maintain persistence without alerting the account owner.
author: Ryoshi Security Team
date: 2025-01-10
references:
  - https://attack.mitre.org/techniques/T1070/004/
  - https://attack.mitre.org/techniques/T1566/001/
tags:
  - email_manipulation
  - defense_evasion
  - phishing
severity: medium
logsource:
  category: outlook
  product: office365
detection:
  selection_send:
    action: "Send"
    folder_path: "Sent Items"
  selection_delete:
    action:
      - "SoftDelete"
      - "HardDelete"
      - "MoveToDeletedItems"
    folder_path: "Sent Items"
  condition: selection_send and selection_delete
  timeframe: 5m
falsepositives:
  - Email clients with aggressive cleanup policies
  - Users who manually delete sent items for privacy
  - Corporate policies requiring immediate deletion of certain email types
  - Automated compliance tools
level: medium
